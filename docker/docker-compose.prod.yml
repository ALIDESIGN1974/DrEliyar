version: '3.8'

services:
  db_dreliar:
    image: postgres:14
    container_name: postgres_db_dreliar
    env_file:
      - ../.env
    volumes:
      - postgres_data_dreliar:/var/lib/postgresql/data
    networks:
      - portfolio_network_dreliar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_dreliar:
    image: redis:6
    container_name: redis_dreliar
    networks:
      - portfolio_network_dreliar

  web_dreliar:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: django_web_dreliar
    command: sh -c "/entrypoint.sh && gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ../app:/app
      - ../app/static:/app/static
      - ../app/media:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      db_dreliar:
        condition: service_healthy
      redis_dreliar:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - portfolio_network_dreliar

  telegram_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram_bot_dreliar
    command: python manage.py bot
    volumes:
      - ../app:/app
    env_file:
      - ../.env
    depends_on:
      - db_dreliar
      - web_dreliar
    networks:
      - portfolio_network_dreliar

networks:
  portfolio_network_dreliar:
    driver: bridge

volumes:
  postgres_data_dreliar:
