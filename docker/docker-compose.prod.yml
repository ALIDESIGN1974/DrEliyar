version: '3.8'

services:
  db_namex:
    image: postgres:14
    container_name: postgres_db_namex
    env_file:
      - ../.env
    volumes:
      - postgres_data_namex:/var/lib/postgresql/data
    networks:
      - portfolio_network_namex
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis_namex:
    image: redis:6
    container_name: redis_namex
    networks:
      - portfolio_network_namex

  web_namex:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: django_web_namex
    command: sh -c "/entrypoint.sh && gunicorn core.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ../app:/app
      - ../app/static:/app/static
      - ../app/media:/app/media
    env_file:
      - ../.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
    depends_on:
      db_namex:
        condition: service_healthy
      redis_namex:
        condition: service_started
    ports:
      - "8000:8000"
    networks:
      - portfolio_network_namex

  telegram_bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram_bot_namex
    command: python manage.py bot
    volumes:
      - ../app:/app
    env_file:
      - ../.env
    depends_on:
      - db_namex
      - web_namex
    networks:
      - portfolio_network_namex

networks:
  portfolio_network_namex:
    driver: bridge

volumes:
  postgres_data_namex:
